name: Build Binaries

on:
  push:
    tags:
      - '*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x86_64
          - os: macos-latest
            name: macos-arm64
          - os: windows-latest
            name: windows-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build binary
        run: |
          pyinstaller --onefile --name eb-${{ matrix.name }} \
            --hidden-import ebcli.core.ebcore \
            --hidden-import ebcli.controllers \
            --collect-data ebcli \
            --copy-metadata awsebcli \
            ebcli/core/ebcore.py
        shell: bash

      - name: Smoke test
        run: ./dist/eb-${{ matrix.name }}* --version
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: eb-${{ matrix.name }}
          path: dist/eb-${{ matrix.name }}*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*

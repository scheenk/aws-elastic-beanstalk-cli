name: Build Binaries

on:
  push:
    tags:
      - '[0-9]+.*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x86_64
          - os: macos-latest
            name: macos-arm64
          - os: windows-latest
            name: windows-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install .
          pip install pyinstaller

      - name: Build binary
        run: |
          echo "from ebcli.core.ebcore import main; main()" > eb_entry.py
          pyinstaller --onedir --name eb \
            --hidden-import ebcli.core.ebcore \
            --hidden-import ebcli.controllers \
            --hidden-import cement.ext.ext_dummy \
            --hidden-import cement.ext.ext_json \
            --hidden-import cement.ext.ext_logging \
            --hidden-import cement.ext.ext_argparse \
            --hidden-import cement.ext.ext_plugin \
            --collect-all cement \
            --collect-data ebcli \
            --copy-metadata awsebcli \
            --copy-metadata botocore \
            --copy-metadata setuptools \
            eb_entry.py
          tar czf dist/eb-${{ matrix.name }}.tar.gz -C dist eb
        shell: bash

      - name: Smoke test (Unix)
        if: runner.os != 'Windows'
        run: |
          ./dist/eb/eb --version
          ./dist/eb/eb --help
        shell: bash

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        run: |
          ./dist/eb/eb.exe --version
          ./dist/eb/eb.exe --help
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: eb-${{ matrix.name }}
          path: dist/eb-${{ matrix.name }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*
